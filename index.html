<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle v2</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 15px; margin: 10px auto; border-radius: 10px; max-width: 400px; }
        .val { font-size: 1.8rem; color: #38bdf8; font-weight: bold; }
        button { padding: 15px; width: 80%; font-weight: bold; cursor: pointer; border-radius: 8px; border: none; margin: 5px; }
        .btn-conectar { background: #2563eb; color: white; }
        .btn-motor { background: #dc2626; color: white; }
        .btn-salvar { background: #059669; color: white; }
    </style>
</head>
<body>
    <h2>Sistema de Carga & Motor</h2>
    <button class="btn-conectar" onclick="conectar()">CONECTAR VIA BLUETOOTH</button>

    <div class="card">
        <p>Dado Bruto Célula (HX711):</p>
        <div id="peso" class="val">---</div>
    </div>

    <div class="card">
        <p>Bateria: <span id="bat">---</span>%</p>
        <p>Relógio ESP: <span id="clock">--:--</span></p>
    </div>

    <div class="card">
        <p>Acionamento Manual:</p>
        <button class="btn-motor" onmousedown="controlarMotor('1')" onmouseup="controlarMotor('0')" ontouchstart="controlarMotor('1')" ontouchend="controlarMotor('0')">SEGURE PARA LIGAR MOTOR</button>
    </div>

    <div class="card">
        <p>Agendar Horário:</p>
        <input type="time" id="inputHora" style="font-size: 1.2rem; padding: 5px;">
        <button class="btn-salvar" onclick="enviarHorario()">DEFINIR AGENDAMENTO</button>
        <p style="font-size: 0.8rem;">Último acionamento: <span id="lastMotor">---</span></p>
    </div>

    <script>
        const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const DATA_CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
        const CONF_CHAR_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

        let configChar;
        const encoder = new TextEncoder();

        async function conectar() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ESP32-SISTEMA-CARGA' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                
                // Receber Dados
                const dataChar = await service.getCharacteristic(DATA_CHAR_UUID);
                await dataChar.startNotifications();
                dataChar.addEventListener('characteristicvaluechanged', (e) => {
                    const [peso, bat, lastM, realTime] = new TextDecoder().decode(e.target.value).split('|');
                    document.getElementById('peso').innerText = peso;
                    document.getElementById('bat').innerText = bat;
                    document.getElementById('lastMotor').innerText = lastM;
                    document.getElementById('clock').innerText = realTime;
                });

                configChar = await service.getCharacteristic(CONF_CHAR_UUID);

                // SINCRONIZA HORÁRIO AUTOMATICAMENTE AO CONECTAR
                const agora = new Date();
                const syncStr = `SYNC:${agora.getFullYear()}-${agora.getMonth()+1}-${agora.getDate()} ${agora.getHours()}:${agora.getMinutes()}:${agora.getSeconds()}`;
                await configChar.writeValue(encoder.encode(syncStr));

                alert("Conectado e Hora Sincronizada!");
            } catch (err) { alert(err.message); }
        }

        async function enviarHorario() {
            const hora = document.getElementById('inputHora').value;
            if (configChar && hora) {
                await configChar.writeValue(encoder.encode("SCH:" + hora));
                alert("Agendado para: " + hora);
            }
        }

        async function controlarMotor(estado) {
            if (configChar) {
                await configChar.writeValue(encoder.encode("MOT:" + estado));
            }
        }
    </script>
</body>
</html>
